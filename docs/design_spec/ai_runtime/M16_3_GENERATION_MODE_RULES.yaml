standards_awareness_policy:
- every generation-mode request must declare a version-pinned standards_guardrail_ref
- standards_guardrail_ref must match a generation-eligible standards_guardrail_context item
- AI may not invent standards
- AI may not replace standards guardrails
bounded_invention_policy:
- bounded invention is mode-specific
- bounded invention must remain candidate language only
- assumptions must be labeled when required by the selected mode
- placeholders must be used where truth is missing
- bounded invention cannot create source truth, execution truth, evidence, or standards truth
