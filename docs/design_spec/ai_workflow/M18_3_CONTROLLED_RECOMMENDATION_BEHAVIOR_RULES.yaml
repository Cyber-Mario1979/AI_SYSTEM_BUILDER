doc_type: design_spec
canonical_name: M18_3_CONTROLLED_RECOMMENDATION_BEHAVIOR_RULES
status: IMPLEMENTED_PENDING_VALIDATION
governs_execution: false
document_state_mode: design_spec_evidence
authority: implementation_evidence_only
checkpoint: M18.3
milestone: M18
phase: Phase 6 — AI Layer

controlled_recommendation_behavior:
  checkpoint: M18.3
  contract_version: ai-controlled-recommendation-behavior-v1
  package: asbp.ai_workflow
  module: asbp.ai_workflow.recommendation_behavior

  purpose:
    - Define bounded recommendation or suggestion behavior where allowed.
    - Define prohibited recommendation classes where unsafe or out-of-scope.
    - Preserve advisory-only behavior.
    - Preserve governed runtime and retrieval-use constraints inherited from M16 and M17.
    - Preserve evidence and source-role discipline inherited from M17.

  assistance_role:
    value: advisory_recommendation_assistance
    rule: AI recommendation assistance is advisory metadata only and cannot become approval, release, validation, UAT, execution truth, workflow mutation, action execution, document generation, report generation, product-ready rendering, or autonomous agentic behavior.

  supported_recommendation_target_families:
    - document_artifact_recommendation_target
    - reporting_artifact_recommendation_target
    - workflow_state_recommendation_target
    - ai_output_recommendation_target

  supported_recommendation_modes:
    - evidence_bound_recommendation
    - contract_aligned_recommendation
    - gap_and_risk_recommendation

  supported_recommendation_categories:
    - evidence_followup_recommendation
    - contract_alignment_recommendation
    - gap_closure_recommendation
    - risk_mitigation_recommendation
    - human_review_escalation_recommendation
    - source_role_discipline_recommendation
    - detail_discipline_recommendation
    - workflow_readiness_recommendation

  supported_recommendation_priorities:
    - low
    - medium
    - high

  source_requirements:
    source_quality_gate_required: true
    source_quality_gate_must_pass: true
    evidence_refs_must_be_inside_source_quality_gate: true
    source_refs_must_be_inside_source_quality_gate: true
    recommendation_item_refs_must_be_inside_request_scope: true
    boundary_finding_refs_must_be_inside_request_scope: true

  recommendation_discipline:
    structured_metadata_only: true
    free_form_recommendation_text_allowed: false
    recommendation_items_require_human_decision: true
    preserve_evidence_traceability: true
    preserve_source_role_discipline: true
    action_execution_allowed: false
    autonomous_agentic_behavior_allowed: false

  authority_constraints:
    controlled_recommendation_metadata_allowed: true
    ai_can_approve: false
    ai_can_release: false
    ai_can_mutate_workflow_state: false
    ai_can_execute_actions: false
    ai_can_replace_human_decision: false
    ai_can_generate_document: false
    ai_can_generate_report: false
    ai_can_render_product_ready_document: false
    ai_can_render_product_ready_report: false
    ai_can_claim_validation_truth: false
    approval_payload_allowed: false
    workflow_release_payload_allowed: false
    state_mutation_payload_allowed: false
    action_execution_payload_allowed: false
    document_generation_payload_allowed: false
    report_generation_payload_allowed: false
    product_ready_rendering_payload_allowed: false
    validation_or_uat_truth_claim_allowed: false

  prohibited_payload_fields:
    - raw_prompt
    - free_form_prompt
    - unvalidated_user_prompt
    - prompt_template
    - system_prompt
    - developer_prompt
    - direct_llm_call
    - llm_provider
    - model_name
    - api_key
    - generated_recommendation_text
    - recommendation_narrative_text
    - free_form_recommendation_text
    - generated_document_text
    - generated_report_text
    - generated_output_text
    - document_factory_payload
    - document_template_payload
    - document_generation_payload
    - report_generation_payload
    - document_renderer_payload
    - product_ready_document_payload
    - product_ready_report_payload
    - export_payload
    - dashboard_payload
    - recommendation_payload
    - action_execution_payload
    - autonomous_agent_payload
    - state_mutation_payload
    - approval_payload
    - workflow_release_payload
    - execution_truth_override
    - source_truth_override
    - validation_truth_override
    - standards_truth_override

  supported_boundary_finding_categories:
    - recommendation_approval_authority_boundary_finding
    - recommendation_release_authority_boundary_finding
    - recommendation_workflow_state_mutation_boundary_finding
    - recommendation_action_execution_boundary_finding
    - recommendation_document_generation_boundary_finding
    - recommendation_report_generation_boundary_finding
    - recommendation_product_rendering_boundary_finding
    - recommendation_validation_truth_boundary_finding
    - recommendation_autonomous_agentic_behavior_boundary_finding
    - recommendation_ungrounded_action_boundary_finding

  supported_boundary_finding_severities:
    - info
    - warning
    - blocking

  supported_assistance_results:
    - recommendation_assistance_ready
    - recommendation_assistance_recommendations_identified
    - recommendation_assistance_boundary_findings_identified
    - recommendation_assistance_recommendations_and_boundary_findings_identified

  deterministic_result_rule:
    no_recommendation_items_and_no_boundary_findings: recommendation_assistance_ready
    one_or_more_recommendation_items_only: recommendation_assistance_recommendations_identified
    one_or_more_boundary_findings_only: recommendation_assistance_boundary_findings_identified
    recommendation_items_and_boundary_findings: recommendation_assistance_recommendations_and_boundary_findings_identified

  deferred_scope_protection:
    document_factory_in_scope: false
    document_template_product_implementation_in_scope: false
    actual_document_generation_in_scope: false
    actual_report_generation_in_scope: false
    product_ready_document_rendering_in_scope: false
    product_ready_report_rendering_in_scope: false
    workflow_state_mutation_in_scope: false
    action_execution_in_scope: false
    autonomous_agentic_behavior_in_scope: false
    actual_llm_calls_in_scope: false
    prompt_templates_in_scope: false
    validation_or_uat_truth_claims_in_scope: false

  validation:
    expected_command: python -m pytest -q
    current_status: pending_local_validation
    recorded_result: pending
