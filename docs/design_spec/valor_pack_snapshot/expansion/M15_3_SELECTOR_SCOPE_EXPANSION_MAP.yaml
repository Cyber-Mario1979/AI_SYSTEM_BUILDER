naming_policy:
  context_selector_prefix: CS
  computerized_systems_domain_canonical: CSV
  legacy_computerized_systems_domain: CS
  rule: >
    CS is reserved as the context-selector prefix. Computerized systems should use
    CSV as the future ASBP-native domain acronym to avoid IDs like CS-CS-E2E.
  legacy_id_map:
    - legacy_selector_id: CS-CS-E2E
      future_canonical_selector_id: CS-CSV-E2E

scope_tokens:
  - scope: E2E
    name: End-to-end CQV lifecycle
    meaning: New build, major project, equipment introduction, or full lifecycle.
  - scope: PV
    name: Periodic verification
    meaning: Periodic verification, periodic review, or periodic reclassification as applicable.
  - scope: QUAL
    name: Qualification only
    meaning: Qualification deliverables only; commissioning is handled separately.
  - scope: COMM
    name: Commissioning only
    meaning: Commissioning deliverables only; qualification deliverables are out of scope.
  - scope: POST-DEV
    name: Post deviation
    meaning: Targeted requalification or retest after deviation.
  - scope: POST-CHANGE
    name: Post change
    meaning: Change-control requalification after controlled modification.
  - scope: DECOM
    name: Decommissioning
    meaning: Controlled retirement, removal, deactivation, or removal from GMP use.

decommissioning_boundary:
  post_change: Asset continues in use after modification.
  decom: Asset, system, utility, or area is retired, removed, disabled, or taken out of GMP use.

existing_snapshot_domain_support:
  PE:
    domain_name: Process Equipment
    existing_scopes: [E2E, PV, POST-DEV, POST-CHANGE]
