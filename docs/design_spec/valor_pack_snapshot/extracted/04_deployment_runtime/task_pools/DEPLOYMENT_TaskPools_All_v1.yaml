sha256: 3e022ced07df96e14767b40292cb078f404a9ea48d6065bde26ff28103bf5c72
library:
  task_pool_id: TP-PE-POST-CHANGE
  version: v1
  revision_date: '2026-02-14'
  description: Atomic task pool for process equipment post-change delta qualification
    (change control impact + targeted re-qualification + release).
  owner_function: CQV
  integrity:
    schema_version: v0.1.0
    binds_to_profile:
      profile_id: PROF-PE-POST-CHANGE
      profile_version: v1
  governance:
    change_control_ref: N/A (design-stage dataset)
  tasks:
  - atomic_task_id: PECHG-IMPACT
    name: Change impact assessment (requirements/tests affected)
    phase: QRM
    task_type: IMPACT_ASSESSMENT
    owner_role_default: CQV Engineer
    applicability_tags:
    - ProcessEquipment
    - PostChange
    - ChangeControl
    required_inputs:
    - Approved change request (scope, rationale, implementation details)
    - Baseline qualification pack available
    outputs:
    - Impact assessment completed
    - Delta qualification strategy defined (what to re-test)
    duration_ref:
      profile_key: PECHG_IMPACT_ASSESS_DUR
    dependency_wiring:
      predecessors: []
    flags:
      is_optional: false
  - atomic_task_id: PECHG-RTM-DELTA
    name: RTM / requirements delta update
    phase: RTM
    task_type: UPDATE
    owner_role_default: CQV Engineer
    applicability_tags:
    - ProcessEquipment
    - PostChange
    - ChangeControl
    required_inputs:
    - Impact assessment completed
    outputs:
    - RTM delta updated (coverage of changed requirements)
    duration_ref:
      profile_key: PECHG_RTM_DELTA_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PECHG-IMPACT
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: true
    notes: Optional if your RTM is not maintained post-project; recommended for GMP
      critical systems.
  - atomic_task_id: PECHG-PROTOCOL-DELTA
    name: Protocol delta authoring (partial IQ/OQ/PQ as needed)
    phase: VERIFICATION
    task_type: AUTHORING
    owner_role_default: CQV Engineer
    applicability_tags:
    - ProcessEquipment
    - PostChange
    - DeltaQualification
    required_inputs:
    - Impact assessment completed
    - RTM delta updated (if used)
    outputs:
    - Approved protocol delta / addendum
    duration_ref:
      profile_key: PECHG_PROTOCOL_DELTA_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PECHG-IMPACT
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: PECHG-EXEC-DELTA
    name: Delta execution (partial IQ/OQ/PQ steps)
    phase: VERIFICATION
    task_type: EXECUTION
    owner_role_default: CQV Engineer
    applicability_tags:
    - ProcessEquipment
    - PostChange
    - DeltaQualification
    required_inputs:
    - Approved protocol delta / addendum
    - Equipment available and safe to test
    outputs:
    - Delta execution evidence pack
    - Exceptions list (if any)
    duration_ref:
      profile_key: PECHG_EXEC_DELTA_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PECHG-PROTOCOL-DELTA
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: PECHG-REPORT
    name: Qualification report addendum / update
    phase: VERIFICATION
    task_type: REPORT
    owner_role_default: CQV Engineer
    applicability_tags:
    - ProcessEquipment
    - PostChange
    required_inputs:
    - Delta execution complete
    - Exceptions dispositioned (if any)
    outputs:
    - Approved qualification addendum / updated report section
    duration_ref:
      profile_key: PECHG_REPORT_ADDENDUM_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PECHG-EXEC-DELTA
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: PECHG-TRAINING
    name: Training / SOP update readiness (if required)
    phase: RELEASE
    task_type: READINESS
    owner_role_default: System Owner
    applicability_tags:
    - ProcessEquipment
    - PostChange
    required_inputs:
    - Change impacts on procedures identified
    outputs:
    - Training completed (if required)
    - SOP/work instruction updates completed (if required)
    duration_ref:
      profile_key: TRAINING_UPDATE_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PECHG-REPORT
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: true
  - atomic_task_id: PECHG-RELEASE
    name: QA approval / change closure gate
    phase: RELEASE
    task_type: APPROVAL
    owner_role_default: QA Reviewer
    applicability_tags:
    - ProcessEquipment
    - PostChange
    - ChangeControl
    required_inputs:
    - Qualification addendum/update approved
    - Training/SOP updates complete or justified (if applicable)
    outputs:
    - Change control closure approved
    - Release decision confirmed
    duration_ref:
      profile_key: PECHG_RELEASE_GATE_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PECHG-REPORT
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: PECHG-DEV-RECORD
    name: Deviation record (event-driven, if required)
    phase: QMS
    task_type: DEVIATION_RECORD
    owner_role_default: QA Reviewer
    applicability_tags:
    - ProcessEquipment
    - Quality
    required_inputs:
    - Deviation raised (if applicable)
    outputs:
    - Deviation record created/updated
    duration_ref:
      profile_key: DEV_RECORD_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PECHG-RELEASE
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: true
      is_event_driven: true
  - atomic_task_id: PECHG-CAPA-RECORD
    name: CAPA record (event-driven)
    phase: QMS
    task_type: CAPA_RECORD
    owner_role_default: QA Reviewer
    applicability_tags:
    - ProcessEquipment
    - Quality
    required_inputs:
    - CAPA required by QA disposition
    outputs:
    - CAPA created and tracked
    duration_ref:
      profile_key: CAPA_RECORD_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PECHG-DEV-RECORD
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: true
      is_event_driven: true
---
