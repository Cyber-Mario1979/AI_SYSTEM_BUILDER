library:
  task_pool_id: TP-CR-COMM
  version: v1
  revision_date: '2026-02-14'
  description: Atomic task pool for cleanroom commissioning-only WPs. Commissioning
    and turnover only; qualification/classification handled in separate WP if required.
  owner_function: Engineering
  integrity:
    schema_version: v0.1.0
    binds_to_profile:
      profile_id: PROF-CR-COMM
      profile_version: v1
  governance:
    change_control_ref: N/A (design-stage dataset)
  tasks:
  - atomic_task_id: CRCOM-PLAN
    name: Commissioning plan / execution plan
    phase: COMM
    task_type: PLAN
    owner_role_default: Facilities/Engineering Lead
    applicability_tags:
    - Cleanroom
    - CommissioningOnly
    required_inputs:
    - Area scope and boundaries defined
    - Utilities/AHU interface points identified
    outputs:
    - Approved commissioning plan
    duration_ref:
      profile_key: CR_COMM_PLAN_DUR
    dependency_wiring:
      predecessors: []
    flags:
      is_optional: false
  - atomic_task_id: CRCOM-READINESS
    name: Area readiness / pre-commissioning checks
    phase: COMM
    task_type: READINESS
    owner_role_default: Facilities/Engineering Lead
    applicability_tags:
    - Cleanroom
    - CommissioningOnly
    required_inputs:
    - Commissioning plan approved
    - Installation substantially complete (architectural/HVAC/electrical)
    outputs:
    - Readiness checklist complete
    duration_ref:
      profile_key: CR_READINESS_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: CRCOM-PLAN
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: CRCOM-BALANCE-CONTROLS
    name: Air balancing & controls functional commissioning
    phase: COMM
    task_type: EXECUTION_CONTROLS
    owner_role_default: Facilities/Controls Engineer
    applicability_tags:
    - Cleanroom
    - CommissioningOnly
    required_inputs:
    - Readiness complete
    - AHU systems available for operation
    outputs:
    - Balancing/controls commissioning evidence
    - Issues list (if any)
    duration_ref:
      profile_key: CR_BALANCE_CONTROLS_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: CRCOM-READINESS
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: CRCOM-HEPA
    name: HEPA integrity / leak testing (commissioning scope)
    phase: COMM
    task_type: EXECUTION_HEPA
    owner_role_default: Facilities/Validation Service Provider
    applicability_tags:
    - Cleanroom
    - CommissioningOnly
    required_inputs:
    - Air balancing at stable state (as applicable)
    outputs:
    - HEPA integrity/leak test evidence
    duration_ref:
      profile_key: CR_HEPA_TEST_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: CRCOM-BALANCE-CONTROLS
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: true
    notes: Optional if HEPA testing is reserved for formal qualification/classification
      WP.
  - atomic_task_id: CRCOM-RECOVERY
    name: Room recovery checks (optional)
    phase: COMM
    task_type: EXECUTION_RECOVERY
    owner_role_default: Facilities/Engineering Lead
    applicability_tags:
    - Cleanroom
    - CommissioningOnly
    required_inputs:
    - Stable HVAC operation
    outputs:
    - Recovery check evidence (if executed)
    duration_ref:
      profile_key: CR_RECOVERY_TEST_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: CRCOM-BALANCE-CONTROLS
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: true
  - atomic_task_id: CRCOM-PUNCHLIST
    name: Punch list closure & re-check
    phase: COMM
    task_type: CLOSURE
    owner_role_default: Facilities/Engineering Lead
    applicability_tags:
    - Cleanroom
    - CommissioningOnly
    required_inputs:
    - Commissioning issues list raised (if any)
    outputs:
    - Punch list closed (or dispositioned)
    - Re-check evidence
    duration_ref:
      profile_key: CR_PUNCHLIST_CLOSE_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: CRCOM-BALANCE-CONTROLS
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: true
  - atomic_task_id: CRCOM-TURNOVER
    name: Turnover / as-built handover
    phase: TURNOVER
    task_type: HANDOVER
    owner_role_default: Facilities/Engineering Lead
    applicability_tags:
    - Cleanroom
    - CommissioningOnly
    required_inputs:
    - Commissioning evidence complete
    - Punch list closed or dispositioned
    outputs:
    - Turnover package (as-builts, O&M manuals, commissioning records)
    - Ready for qualification WP (if applicable)
    duration_ref:
      profile_key: CR_TURNOVER_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: CRCOM-BALANCE-CONTROLS
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
