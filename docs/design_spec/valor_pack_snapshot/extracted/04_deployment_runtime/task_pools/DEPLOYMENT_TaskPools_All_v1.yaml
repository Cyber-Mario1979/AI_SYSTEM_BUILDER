  tasks:
  - atomic_task_id: CRPV-PLAN
    name: PV plan / scope definition (rooms + states + sampling plan)
    phase: PV
    task_type: PLAN
    owner_role_default: CQV Engineer
    applicability_tags:
    - Cleanroom
    - PeriodicVerification
    - Reclassification
    required_inputs:
    - Room list and classifications available
    - Previous qualification/reclassification baseline available
    outputs:
    - PV plan approved
    - Room-state test matrix confirmed
    duration_ref:
      profile_key: CRPV_PLAN_DUR
    dependency_wiring:
      predecessors: []
    flags:
      is_optional: false
  - atomic_task_id: CRPV-DOC-REVIEW
    name: PV document review (maintenance, balancing, filters, alarms, changes, deviations)
    phase: PV
    task_type: REVIEW
    owner_role_default: CQV Engineer
    applicability_tags:
    - Cleanroom
    - PeriodicVerification
    required_inputs:
    - PV plan approved
    - HVAC maintenance logs available
    - Change control and deviation logs available
