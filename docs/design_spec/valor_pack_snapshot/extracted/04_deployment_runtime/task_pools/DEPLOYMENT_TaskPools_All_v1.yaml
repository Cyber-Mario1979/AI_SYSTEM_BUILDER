library:
  task_pool_id: TP-PE-E2E
  version: v1
  revision_date: '2025-12-26'
  description: Atomic task pool for Process Equipment — High. Tasks reference Profile
    Library duration keys (no embedded numeric durations). Designed for deterministic
    staging into WPs.
  owner_function: CQV
  integrity:
    schema_version: v0.1.0
    binds_to_profile:
      profile_id: PROF-PE-E2E
      profile_version: v1
  governance:
    change_control_ref: N/A (design-stage dataset)
  tasks:
  - atomic_task_id: PE2E-VMP-CYCLE
    name: VMP cycle (draft/review/approval)
    phase: VMP
    task_type: AUTHORING
    owner_role_default: CQV
    applicability_tags:
    - ProcessEquipment
    - HighComplexity
    - Project
    required_inputs:
    - Project scope defined
    - System boundary agreed
    outputs:
    - Approved VMP
    duration_ref:
      profile_key: VMP_CYCLE_DUR
    dependency_wiring:
      predecessors: []
    flags:
      is_optional: true
    notes: Optional predecessor for single equipment; mandatory for project/multi-equipment
      per policy flags.
  - atomic_task_id: PE2E-URS-AUTH
    name: URS authoring
    phase: URS
    task_type: AUTHORING
    owner_role_default: CQV
    applicability_tags:
    - ProcessEquipment
    - HighComplexity
    - SingleEquipment
    - Project
    required_inputs:
    - WP created
    - Scope defined
    outputs:
    - URS draft
    duration_ref:
      profile_key: URS_AUTHORING_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: PE2E-VMP-CYCLE
        dependency_type: FS
        lag_days: 0
  - atomic_task_id: PE2E-URS-REVIEW
    name: URS cross-functional review
    phase: URS
    task_type: REVIEW
    owner_role_default: QA
    applicability_tags:
    - ProcessEquipment
    - HighComplexity
    required_inputs:
