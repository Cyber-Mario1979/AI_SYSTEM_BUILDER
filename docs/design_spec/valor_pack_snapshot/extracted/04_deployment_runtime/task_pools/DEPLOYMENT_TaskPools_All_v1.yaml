library:
  task_pool_id: TP-UT-POST-CHANGE
  version: v1
  revision_date: '2026-02-14'
  description: Atomic task pool for utilities post-change delta qualification (change
    control impact + targeted re-qualification + release).
  owner_function: CQV
  integrity:
    schema_version: v0.1.0
    binds_to_profile:
      profile_id: PROF-UT-POST-CHANGE
      profile_version: v1
  governance:
    change_control_ref: N/A (design-stage dataset)
  tasks:
  - atomic_task_id: UTCHG-IMPACT
    name: Change impact assessment (requirements/tests affected)
    phase: QRM
    task_type: IMPACT_ASSESSMENT
    owner_role_default: CQV Engineer
    applicability_tags:
    - Utilities
    - PostChange
    - ChangeControl
    required_inputs:
    - Approved change request (scope, rationale, implementation details)
    - Baseline qualification package available (IQ/OQ/PQ as applicable)
    - Updated drawings/specs available (P&ID, datasheets) if impacted
    outputs:
    - Impact assessment completed
    - Delta qualification strategy defined (what to re-test and why)
    duration_ref:
      profile_key: UTCHG_IMPACT_ASSESS_DUR
    dependency_wiring:
      predecessors: []
    flags:
      is_optional: false
  - atomic_task_id: UTCHG-RTM-DELTA
    name: RTM / requirements delta update
    phase: RTM
    task_type: UPDATE
    owner_role_default: CQV Engineer
    applicability_tags:
    - Utilities
    - PostChange
    - ChangeControl
    required_inputs:
    - Impact assessment completed
    outputs:
    - RTM delta updated (coverage of changed requirements)
    duration_ref:
      profile_key: UTCHG_RTM_DELTA_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: UTCHG-IMPACT
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: true
    notes: Optional if RTM is not maintained in operations; recommended for GMP critical
      utilities.
  - atomic_task_id: UTCHG-PROTOCOL-DELTA
    name: Protocol delta authoring (partial IQ/OQ/PQ as needed)
    phase: VERIFICATION
    task_type: AUTHORING
    owner_role_default: CQV Engineer
    applicability_tags:
    - Utilities
    - PostChange
    - DeltaQualification
    required_inputs:
    - Impact assessment completed
    - RTM delta updated (if used)
    - Updated design/configuration details available
    outputs:
    - Approved protocol delta / addendum (test steps + acceptance criteria)
    duration_ref:
      profile_key: UTCHG_PROTOCOL_DELTA_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: UTCHG-IMPACT
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: UTCHG-EXEC-DELTA
    name: Delta execution (partial IQ/OQ/PQ steps)
    phase: VERIFICATION
    task_type: EXECUTION
    owner_role_default: CQV Engineer
    applicability_tags:
    - Utilities
    - PostChange
    - DeltaQualification
    required_inputs:
    - Approved protocol delta / addendum
    - Utility system available and safe to test
    - Operations/facilities coordination complete (permits/LOTO as applicable)
    outputs:
    - Delta execution evidence pack
    - Exceptions list (if any)
    duration_ref:
      profile_key: UTCHG_EXEC_DELTA_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: UTCHG-PROTOCOL-DELTA
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: UTCHG-REPORT
    name: Qualification report addendum / update
    phase: VERIFICATION
    task_type: REPORT
    owner_role_default: CQV Engineer
    applicability_tags:
    - Utilities
    - PostChange
    required_inputs:
    - Delta execution complete
    - Exceptions dispositioned (if any)
    outputs:
    - Approved qualification addendum / updated report section
    duration_ref:
      profile_key: UTCHG_REPORT_ADDENDUM_DUR
    dependency_wiring:
      predecessors:
      - atomic_task_id: UTCHG-EXEC-DELTA
        dependency_type: FS
        lag_days: 0
    flags:
      is_optional: false
  - atomic_task_id: UTCHG-TRAINING
    name: Training / SOP update readiness (if required)
    phase: RELEASE
    task_type: READINESS
    owner_role_default: System Owner
    applicability_tags:
    - Utilities
    - PostChange
    required_inputs:
