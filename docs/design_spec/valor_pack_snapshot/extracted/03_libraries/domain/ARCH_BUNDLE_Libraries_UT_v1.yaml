library:
  selector_id: CS-UT-E2E
  version: v1
  revision_date: '2025-12-26'
  name: "Utilities \u2014 High (Project/System)"
  description: Context selector for high-complexity utilities programs (e.g., HVAC,
    PWS, steam, CDA). Binds TP-UT-E2E + PROF-UT-E2E and CAL-WORKWEEK. Designed for
    deterministic staging and planning.
  applicability:
    system_type: Utilities
    complexity: High
    tags_any:
    - Utilities
    - HighComplexity
    tags_all: []
    scope_hints:
    - project
    - facility
    - multi-system
    - utilities
  bindings:
    task_pool_ref:
      task_pool_id: TP-UT-E2E
      task_pool_version: v1
    profile_ref:
      profile_id: PROF-UT-E2E
      profile_version: v1
    calendar_logic_ref:
      calendar_id: CAL-WORKWEEK
      calendar_version: v1
    standards_bundle_ref: null
  rules:
    matching:
      strategy: exact_then_best_effort
      require_exact_match: true
    staging:
      default_ordering: task_pool_order
      apply_optional_tasks_policy: include_optional_with_flags
  stamps:
    selector:
      id: CS-UT-E2E
      version: v1
    profile:
      id: PROF-UT-E2E
      version: v1
    calendar:
      id: CAL-WORKWEEK
      version: v1
    bundle: null
    task_pool:
      id: TP-UT-E2E
      version: v1

