  version: v1
  revision_date: '2025-12-26'
  name: "Process Equipment \u2014 High (Project/Line)"
  description: Context selector for high-complexity process equipment programs (e.g.,
    blister line). Binds TP-PE-E2E + PROF-PE-E2E and CAL-WORKWEEK. Designed for deterministic
    staging and planning.
  applicability:
    system_type: Process
    complexity: High
    tags_any:
