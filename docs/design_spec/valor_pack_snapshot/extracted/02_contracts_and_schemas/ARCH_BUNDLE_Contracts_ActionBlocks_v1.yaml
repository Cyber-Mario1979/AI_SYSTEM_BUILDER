  optional_payload_fields: []
  target_fields:
    required:
    - wp_id
    optional: []
  result_schema_ref: objects/work_package_schema.json
  errors:
  - code: CONFLICT
    subcode: STAGED_SET_NOT_FOUND
  - code: CONFLICT
