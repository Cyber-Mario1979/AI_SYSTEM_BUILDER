---
action_id: BUILD_REPORT
contract: VALOR-contract-orch-rpt
version: v1
purpose: Generate a deterministic WP & Tasks report (single or consolidated multi-WP)
  from WP snapshots. Supports Gantt chart generation.
inputs:
  required:
  - report_type
  - wp_snapshots
  optional:
  - title
  - include_sections
  - output_format
outputs:
  result_schema: schemas/contracts/report_result.schema.json
side_effects: READ_ONLY
idempotent: true
notes:
  v7.1.1_extensions:
  - wp_snapshots is now an array (1-10 WPs)
  - output_format supports: MARKDOWN (default), CSV, GANTT_MERMAID, GANTT_SVG, GANTT_HTML
  - report_type supports: WP_TASKS_REPORT (single), WP_CONSOLIDATED_REPORT (multi),
      WP_GANTT_CHART
  - Gantt charts require plan data for all WPs (refusal condition if missing)
  - Max 10 WPs per operation (performance limit)
---
action_type: WP_APPLY_PLAN
allowed_modes:
- M2
side_effect_class: MUTATES_TRUTH
idempotency: NON_IDEMPOTENT
required_payload_fields:
- plan_id
- date_updates
optional_payload_fields:
- owner_updates
- change_reason
target_fields:
  required:
  - wp_id
  optional: []
result_schema_ref: objects/work_package_schema.json
notes:
  purpose: Commit dates and owners into WP/task truth based on Planning output; enforces
    Proposal vs Commitment boundary.
  expectations:
  - Require explicit confirmation in orchestration before executing.
  - Validate date_updates align with existing task IDs and calendar logic policy.
  - If owner_updates are provided, write Owner strings into task truth (do not overwrite
    non-blank owners unless explicitly requested).
---
action_type: WP_BIND_PRESET_CONTEXT
allowed_modes:
- M2
side_effect_class: MUTATES_TRUTH
idempotency: IDEMPOTENT
required_payload_fields:
- preset_context
optional_payload_fields: []
target_fields:
  required:
  - wp_id
  optional: []
result_schema_ref: objects/work_package_schema.json
notes:
  purpose: Bind/stamp WP with selector/profile/calendar/bundle references used for traceability
    and regulated outputs.
  selector_context_minimum_shape:
    selector:
      id: <selector_id>
      version: <selector_version>
    profile:
      id: <profile_id>
      version: <profile_version>
    calendar:
      id: <calendar_id>
      version: <calendar_version>
    bundle:
      id: <bundle_id>
      version: <bundle_version>
---
action_type: WP_UPDATE_TASK_FIELDS
allowed_modes:
- M2
side_effect_class: MUTATES_TRUTH
idempotency: NON_IDEMPOTENT
required_payload_fields:
- updates
optional_payload_fields:
- change_reason
target_fields:
  required:
  - wp_id
  optional:
  - task_id
result_schema_ref: objects/work_package_schema.json
notes:
  purpose: Assign owners/status/notes and other mutable task/WP fields after tasks
    exist (post-commit).
  expectations:
  - Validate updates[] against task field constraints and WP invariants.
  - Reject attempts to write regulated schedule commitments unless explicitly permitted
    by policy.
---
action_type: WP_BIND_PLANNING_INVARIANTS
allowed_modes:
- M2
side_effect_class: MUTATES_TRUTH
idempotency: IDEMPOTENT
required_payload_fields: []
optional_payload_fields:
- change_reason
- intent
target_fields:
  required:
  - wp_id
  optional: []
result_schema_ref: objects/work_package_schema.json
notes:
  purpose: Bind/stamp complete Planning Invariants atomically (TP + PROF + CAL + SB).
  deterministic_defaults:
  - If SB blank -> SB-CQV-CORE-EG@v1
  - Add-ons never auto-bound
  - If CS bound -> derive TP/PROF/CAL from selector bindings
  - If CS unbound -> resolve CS via GROUP-BINDINGS then derive TP/PROF/CAL
errors:
- code: NOT_FOUND
  subcode: WP_NOT_FOUND
- code: VALIDATION_ERROR
  subcode: BINDING_PROFILE_UNRESOLVED
- code: VALIDATION_ERROR
  subcode: STANDARDS_BUNDLE_UNRESOLVED
- code: CONFLICT
  subcode: BP_ALREADY_BOUND_DIFFERENT
