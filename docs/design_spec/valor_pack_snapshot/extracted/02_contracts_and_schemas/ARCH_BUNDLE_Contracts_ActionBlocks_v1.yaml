  result_schema_ref: objects/work_package_schema.json
  errors:
  - code: NOT_FOUND
    subcode: TASK_NOT_FOUND
  - code: MODE_VIOLATION
    subcode: COMMIT_IN_WRONG_MODE
  - code: INVARIANT_VIOLATION
