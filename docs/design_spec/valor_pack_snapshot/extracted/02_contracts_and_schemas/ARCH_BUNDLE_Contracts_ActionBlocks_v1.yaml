  idempotent: false
  confirmation_required: true
  required_payload_fields:
  - wp_seed
  optional_payload_fields:
  - labels
  - notes
  notes:
  - "WP_CREATE MUST create a NEW Canvas object titled: Work Package WP###."
  - "It is FORBIDDEN to write a new WP header into an existing WP canvas (no multi-WP canvases)."
  - "Preflight: if the active canvas already contains any 'Work Package WP###' title, allocate/open a new canvas before writing."
  target_fields:
    required: []
    optional: []
  result_schema_ref: objects/work_package_schema.json
  errors:
  - code: VALIDATION_ERROR
    subcode: PAYLOAD_SCHEMA_MISMATCH
