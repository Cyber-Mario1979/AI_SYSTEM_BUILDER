  - VALIDATION_ERROR
  - INVARIANT_VIOLATION
  - NOT_FOUND
  - CONFLICT
  - UNSUPPORTED_OPERATION
  - INTERNAL_ERROR
stamp_policy:
  required_for_mutations: false
  required_for_regulated_outputs: true
actions:
