- action_type: WP_COMMIT_CANVAS_HEADER
  allowed_modes:
  - M2
  side_effect_class: MUTATES_TRUTH
  idempotent: true
  confirmation_required: false
  required_payload_fields: []
  optional_payload_fields:
  - change_reason
  notes:
  - Canvas is source of truth for WP header fields; do not regenerate.
  - "Manual WP profile auto-bind (CS=UNBOUND): match Title/Scope (case-insensitive)\
    \ and bind only on a single clear match:\n  - Process Equipment \u2192 PROF-PE-HIGH@v1\n\
    \  - Utilities \u2192 PROF-UT-HIGH@v1\n  - Clean Room/Cleanroom \u2192 PROF-CR-HIGH@v1"
  - "If no clear match \u2192 set PROF=UNBOUND and print chat message: 'Cannot auto-bind\
    \ profile. Please run: Set WP Type <ProcessEquipment|Utilities|CleanRoom> OR Set\
    \ PROF <PROF-ID>@<version>'"
  target_fields:
    required:
    - wp_id
    optional: []
  result_schema_ref: objects/work_package_schema.json
  errors:
  - code: MODE_VIOLATION
    subcode: COMMIT_IN_WRONG_MODE
  - code: NOT_FOUND
    subcode: WP_NOT_FOUND
  - code: CONFLICT
    subcode: CANVAS_WP_ID_MISMATCH
  - code: VALIDATION_ERROR
    subcode: CANVAS_HEADER_PARSE_FAILED
  - code: VALIDATION_ERROR
    subcode: MISSING_REQUIRED_FIELD
- action_type: WP_STAGE_TASKS
  allowed_modes:
  - M2
  side_effect_class: STAGE_ONLY
  idempotent: true
  required_payload_fields:
